<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Dash | Data Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">API</div>
                <span>RESTDash</span>
            </div>
            
            <nav class="side-nav">
                <div class="nav-section">
                    <p class="section-label">Commands</p>
                    <button id="getAllPostsBtn" class="nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        All Posts
                    </button>
                    <button id="getPostsBtn" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        User Posts
                    </button>
                    <button id="getUserBtn" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        User Details
                    </button>
                </div>

                <div class="nav-section">
                    <p class="section-label">Filters</p>
                    <div class="input-container">
                        <input type="number" id="userId" placeholder="Enter User ID (1-10)" min="1" max="10">
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="dot online"></span>
                    <span>API Online</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span>Resources</span> / <span id="currentView">All Posts</span>
                </div>
                <div class="user-meta">
                    <span id="responseStatus" class="badge">idle</span>
                </div>
            </header>

            <div class="dashboard-grid">
                <section class="data-view">
                    <div class="card">
                        <div class="card-header">
                            <h2>Result Output</h2>
                            <div class="view-controls">
                                <button class="btn-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="userDetails" class="user-grid"></div>
                            <div id="postsList" class="posts-timeline">
                                <div class="empty-state">
                                    <p>Select a command to fetch data</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="json-viewer">
                    <div class="card">
                        <div class="card-header">
                            <h2>Raw JSON</h2>
                            <span class="view-label">Preview</span>
                        </div>
                        <div class="card-body editor-bg">
                            <pre id="rawResponse" class="code-preview">// Data will appear here...</pre>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
