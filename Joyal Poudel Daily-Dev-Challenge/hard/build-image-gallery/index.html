<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Gallery | Visual Arts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

        <!-- Gallery Grid -->
        <div class="gallery" id="gallery">
            <!-- Images will be dynamically loaded -->
        </div>

        <!-- Lightbox Modal -->
        <div id="lightbox" class="lightbox">
            <button class="lightbox-prev" id="prevBtn" title="Previous image"><i class="fas fa-chevron-left"></i></button>
            <div class="lightbox-content">
                <img id="lightboxImg" src="" alt="">
                <p id="lightboxCaption"></p>
            </div>
            <button class="lightbox-next" id="nextBtn" title="Next image"><i class="fas fa-chevron-right"></i></button>
            <span class="lightbox-close" id="closeLightbox">&times;</span>
            <div class="lightbox-info" id="imageInfo"></div>
        </div>

        <!-- Loading spinner -->
        <div class="spinner" id="spinner">
            <div class="spin"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
