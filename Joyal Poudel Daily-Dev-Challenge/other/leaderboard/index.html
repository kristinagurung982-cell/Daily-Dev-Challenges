<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Day 2 Leaderboard</h1>
            <p class="subtitle">Daily Dev Challenge - Top Performers</p>
        </div>

        <div class="controls">
            <div class="search-filter">
                <input type="text" id="searchInput" placeholder="Search by name or username...">
            </div>
            <div class="sort-buttons">
                <button class="sort-btn active" data-sort="score">Sort by Score</button>
                <button class="sort-btn" data-sort="time">Sort by Time</button>
                <button class="sort-btn" data-sort="name">Sort by Name</button>
            </div>
        </div>

        <!-- Leaderboard Table -->
        <div class="leaderboard-wrapper">
            <table class="leaderboard">
                <thead>
                    <tr>
                        <th class="rank">Rank</th>
                        <th class="user">User</th>
                        <th class="score">Score</th>
                        <th class="time">Time</th>
                        <th class="status">Status</th>
                        <th class="badge">Badges</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Rows will be dynamically inserted -->
                </tbody>
            </table>
        </div>

        <!-- Stats Section -->
        <div class="stats">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3 id="totalUsers">0</h3>
                <p>Total Participants</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-star"></i>
                <h3 id="avgScore">0</h3>
                <p>Average Score</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <h3 id="avgTime">0s</h3>
                <p>Average Time</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-trophy"></i>
                <h3 id="completionRate">0%</h3>
                <p>Completion Rate</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <i class="fas fa-search"></i>
            <h2>No Results Found</h2>
            <p>Try adjusting your search criteria</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
