<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <header class="header">
            <h1>🎨 Interactive Image Gallery</h1>
            <p>Click on any image to open the lightbox view</p>
        </header>

        <div class="gallery-container">
            <div class="gallery">
                <div class="gallery-item" data-index="0" onclick="openLightbox(0)">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Mountain Landscape">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="1" onclick="openLightbox(1)">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=300&fit=crop" alt="Beach Waves">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="2" onclick="openLightbox(2)">
                    <img src="https://images.unsplash.com/photo-1469022563149-aa64dbd37dae?w=400&h=300&fit=crop" alt="Forest Nature">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="3" onclick="openLightbox(3)">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Mountain Sunset">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="4" onclick="openLightbox(4)">
                    <img src="https://images.unsplash.com/photo-1465056836739-7aae714942d5?w=400&h=300&fit=crop" alt="Galaxy Stars">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="5" onclick="openLightbox(5)">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Alpine Peak">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="6" onclick="openLightbox(6)">
                    <img src="https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=400&h=300&fit=crop" alt="Night City">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="7" onclick="openLightbox(7)">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Snow Mountains">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>

                <div class="gallery-item" data-index="8" onclick="openLightbox(8)">
                    <img src="https://images.unsplash.com/photo-1464207687429-7505649dae38?w=400&h=300&fit=crop" alt="Desert Dunes">
                    <div class="overlay">
                        <span class="zoom-icon">🔍</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox">
            <div class="lightbox-content">
                <button class="lightbox-close" onclick="closeLightbox()">×</button>
                
                <button class="lightbox-nav prev" onclick="prevImage()">❮</button>
                <button class="lightbox-nav next" onclick="nextImage()">❯</button>

                <img src="" alt="Lightbox Image" id="lightboxImage">

                <div class="lightbox-info">
                    <p id="imageCounter">1 / 9</p>
                    <p id="imageTitle">Gallery Image</p>
                </div>
            </div>
        </div>

        <!-- Thumbnails -->
        <div class="thumbnails-container">
            <h3>Thumbnails</h3>
            <div class="thumbnails" id="thumbnails"></div>
        </div>

        <a href="../index.html" class="back-link">← Back to Challenges</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
