<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Consumer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔌 REST API Consumer</h1>
            <p>Send HTTP requests and view responses</p>
        </header>

        <div class="content">
            <div class="request-panel">
                <h2>Request Configuration</h2>
                
                <div class="form-group">
                    <label for="method">HTTP Method:</label>
                    <select id="method" name="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="url">API URL:</label>
                    <input 
                        type="text" 
                        id="url" 
                        placeholder="https://api.example.com/endpoint"
                        value="https://jsonplaceholder.typicode.com/posts"
                    >
                </div>

                <div class="form-group">
                    <label for="headers">Headers (JSON):</label>
                    <textarea 
                        id="headers" 
                        rows="3"
                        placeholder='{"Content-Type": "application/json"}'
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="body">Request Body (JSON):</label>
                    <textarea 
                        id="body" 
                        rows="3"
                        placeholder='{"name": "value"}'
                    ></textarea>
                </div>

                <button id="sendBtn" class="send-btn">📤 Send Request</button>
            </div>

            <div class="response-panel">
                <h2>Response</h2>
                
                <div class="response-meta">
                    <div class="meta-item">
                        <span class="label">Status Code:</span>
                        <span id="statusCode" class="value">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="label">Response Time:</span>
                        <span id="responseTime" class="value">-</span>
                    </div>
                </div>

                <div class="response-body">
                    <div class="response-header">
                        <label>Response Body:</label>
                        <button id="copyBtn" class="copy-btn">📋 Copy</button>
                    </div>
                    <pre id="responseBody">No response yet. Send a request to see the response here.</pre>
                </div>

                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Sending request...</p>
                </div>
            </div>
        </div>

        <div class="examples">
            <h3>📚 Example APIs:</h3>
            <button class="example-btn" data-url="https://jsonplaceholder.typicode.com/posts" data-method="GET">Posts - GET</button>
            <button class="example-btn" data-url="https://jsonplaceholder.typicode.com/users" data-method="GET">Users - GET</button>
            <button class="example-btn" data-url="https://jsonplaceholder.typicode.com/comments" data-method="GET">Comments - GET</button>
        </div>

        <a href="../index.html" class="back-link">← Back to Challenges</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
