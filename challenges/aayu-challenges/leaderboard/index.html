<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="leaderboard-container">
        <header class="header">
            <h1>🏆 Daily Dev Challenges Leaderboard</h1>
            <p>Top performers and their scores</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search developer...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Time</button>
                <button class="filter-btn" data-filter="week">This Week</button>
                <button class="filter-btn" data-filter="month">This Month</button>
            </div>
        </div>

        <div class="stats-display">
            <div class="stat-card">
                <div class="stat-number" id="totalDevelopers">156</div>
                <div class="stat-label">Total Developers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalChallenges">2,847</div>
                <div class="stat-label">Challenges Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgScore">2,450</div>
                <div class="stat-label">Average Score</div>
            </div>
        </div>

        <div class="leaderboard">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Developer</th>
                        <th>Score</th>
                        <th>Challenges</th>
                        <th>Level</th>
                        <th>Join Date</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="prevBtn" class="pagination-btn">← Previous</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextBtn" class="pagination-btn">Next →</button>
        </div>

        <a href="../index.html" class="back-link">← Back to Challenges</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
