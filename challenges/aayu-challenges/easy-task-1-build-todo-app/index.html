<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="todo-container">
        <header class="todo-header">
            <h1>📝 My To-Do List</h1>
            <p>Keep track of your tasks and stay productive</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..." 
                    class="todo-input"
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
        </div>

        <div class="stats">
            <span class="stat">Total: <strong id="totalTasks">0</strong></span>
            <span class="stat">Completed: <strong id="completedTasks">0</strong></span>
            <span class="stat">Pending: <strong id="pendingTasks">0</strong></span>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="empty-state" id="emptyState">
            <p>No tasks yet. Add one to get started! 🚀</p>
        </div>

        <a href="../index.html" class="back-link">← Back to Challenges</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
