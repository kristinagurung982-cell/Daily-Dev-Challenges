<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification System</title>
  <style>
    body { font-family: Arial, sans-serif; background:#eef2f6; color:#0f172a; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; padding:2rem; }
    .container{width:100%;max-width:540px;background:#fff;border-radius:18px;box-shadow:0 16px 40px rgba(15,23,42,0.12);padding:2rem;}
    h1{margin-top:0;}
    .buttons{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;}
    button{padding:.95rem 1.4rem;border:none;border-radius:999px;background:#2563eb;color:#fff;cursor:pointer;transition:transform .12s ease;}
    button:hover{transform:translateY(-1px);}
    .notification { position:relative; margin-top:1rem; padding:1rem 1.25rem; border-radius:14px; background:#eff6ff; border:1px solid #bfdbfe; color:#1e3a8a; display:none; }
    .notification.show { display:block; }
    .close { position:absolute; top:.8rem; right:.8rem; border:none; background:none; color:#1e3a8a; font-size:1.1rem; cursor:pointer; }
    a{display:block;margin-top:1.5rem;color:#2563eb;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Notification System</h1>
    <p>Click a notification type to show a toast-style message.</p>
    <div class="buttons">
      <button data-type="success">Show Success</button>
      <button data-type="warning">Show Warning</button>
      <button data-type="error">Show Error</button>
    </div>
    <div class="notification" id="notification">
      <button class="close" id="closeBtn">×</button>
      <strong id="title">Success</strong>
      <p id="message">Your action was successful.</p>
    </div>
    <a href="../index.html">← Back to Manoj Challenges</a>
  </div>

  <script>
    const notification = document.getElementById('notification');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const closeBtn = document.getElementById('closeBtn');

    const types = {
      success: { title: 'Success', message: 'Your action was successful.', style: '#d1fae5', border: '#34d399', color: '#065f46' },
      warning: { title: 'Warning', message: 'Please double-check the inputs.', style: '#fef3c7', border: '#f59e0b', color: '#92400e' },
      error: { title: 'Error', message: 'Something went wrong. Try again.', style: '#fee2e2', border: '#f87171', color: '#991b1b' }
    };

    document.querySelectorAll('button[data-type]').forEach(button => {
      button.addEventListener('click', () => {
        const type = button.dataset.type;
        const config = types[type];
        title.textContent = config.title;
        message.textContent = config.message;
        notification.style.background = config.style;
        notification.style.borderColor = config.border;
        notification.style.color = config.color;
        notification.classList.add('show');
        clearTimeout(window.notificationTimeout);
        window.notificationTimeout = setTimeout(() => notification.classList.remove('show'), 3500);
      });
    });

    closeBtn.addEventListener('click', () => notification.classList.remove('show'));
  </script>
</body>
</html>
