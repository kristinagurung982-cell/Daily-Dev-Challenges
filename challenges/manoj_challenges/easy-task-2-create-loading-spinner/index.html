<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Spinner</title>
  <style>
    body { font-family: Arial, sans-serif; background:#eef2ff; color:#0f172a; padding:2rem; }
    .card { max-width:560px; margin:0 auto; background:#fff; border-radius:16px; padding:2rem; box-shadow:0 12px 28px rgba(15,23,42,0.08); text-align:center; }
    button{margin-top:1.25rem;padding:.9rem 1.4rem;border:none;background:#2563eb;color:#fff;border-radius:999px;cursor:pointer;font-size:1rem;}
    .spinner { margin:2rem auto; width:60px; height:60px; border:8px solid #e5e7eb; border-top-color:#2563eb; border-radius:50%; animation: spin 1s linear infinite; display:none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a{display:inline-block;margin-top:1.25rem;color:#2563eb;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Loading Spinner</h1>
    <p>Click the button to show a loading spinner for two seconds.</p>
    <button id="loadBtn">Show Spinner</button>
    <div class="spinner" id="spinner"></div>
    <p><a href="../index.html">← Back to Manoj Challenges</a></p>
  </div>
  <script>
    const btn = document.getElementById('loadBtn');
    const spinner = document.getElementById('spinner');

    btn.addEventListener('click', () => {
      spinner.style.display = 'block';
      btn.disabled = true;
      btn.textContent = 'Loading...';

      setTimeout(() => {
        spinner.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Show Spinner';
      }, 2000);
    });
  </script>
</body>
</html>
