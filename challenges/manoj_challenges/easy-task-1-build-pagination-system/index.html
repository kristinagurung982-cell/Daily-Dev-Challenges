<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagination System</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f7fb; color:#102a43; padding:2rem; }
    .card { background:#fff; max-width:640px; margin:0 auto; padding:1.5rem; border-radius:14px; box-shadow:0 10px 30px rgba(16,42,67,0.1); }
    h1{margin-top:0}
    .pagination{display:flex;gap:.5rem; flex-wrap:wrap; margin-top:1rem}
    .page-btn{padding:.75rem 1rem; border:none; background:#e2e8f0; border-radius:999px; cursor:pointer;}
    .page-btn.active{background:#2563eb; color:#fff;}
    .item-list{list-style:none; padding:0; margin:1rem 0 0}
    .item-list li{padding:.85rem 1rem; border-bottom:1px solid #e2e8f0;}
    .item-list li:last-child{border-bottom:none;}
    a{color:#2563eb;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Pagination System</h1>
    <p>Select a page to view the related items. This example loads 30 items and renders 6 per page.</p>
    <div class="pagination" id="pagination"></div>
    <ul class="item-list" id="itemList"></ul>
    <p><a href="../index.html">← Back to Manoj Challenges</a></p>
  </div>

  <script>
    const items = Array.from({ length: 30 }, (_, i) => `Item ${i + 1}`);
    const pageSize = 6;
    const pageCount = Math.ceil(items.length / pageSize);
    const pagination = document.getElementById('pagination');
    const itemList = document.getElementById('itemList');

    function renderPage(page) {
      itemList.innerHTML = items
        .slice((page - 1) * pageSize, page * pageSize)
        .map(item => `<li>${item}</li>`)
        .join('');

      document.querySelectorAll('.page-btn').forEach(btn => {
        btn.classList.toggle('active', Number(btn.dataset.page) === page);
      });
    }

    for (let i = 1; i <= pageCount; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = 'page-btn';
      btn.dataset.page = i;
      btn.addEventListener('click', () => renderPage(i));
      pagination.appendChild(btn);
    }

    renderPage(1);
  </script>
</body>
</html>
