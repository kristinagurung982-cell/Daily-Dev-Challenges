<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1 Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .leaderboard {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .leaderboard-table th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1em;
        }

        .leaderboard-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table tbody tr:hover {
            background: #f5f5f5;
        }

        .rank {
            font-weight: 700;
            font-size: 1.2em;
            color: #667eea;
        }

        .rank.first {
            color: #fbbf24;
            font-size: 1.5em;
        }

        .rank.second {
            color: #c0c0c0;
            font-size: 1.5em;
        }

        .rank.third {
            color: #cd7f32;
            font-size: 1.5em;
        }

        .name {
            font-weight: 600;
            color: #333;
        }

        .score {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .back-link a:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Day 1 Leaderboard</h1>
            <p>Top Performers</p>
        </div>

        <div class="leaderboard">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Challenges Completed</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="3" class="empty-state">
                            <p>🚀 Be the first to complete a challenge!</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="back-link">
            <a href="../">← Back to Challenges</a>
        </div>
    </div>
</body>
</html>
