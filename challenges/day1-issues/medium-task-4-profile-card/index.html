<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Profile Card UI</h1>
        
        <div class="profile-card">
            <div class="card-image">
                <img src="https://via.placeholder.com/200" alt="Profile Picture">
            </div>
            
            <div class="card-content">
                <h2>John Doe</h2>
                <p class="title">Full Stack Developer</p>
                <p class="description">Passionate about creating beautiful and functional web experiences. Coffee enthusiast and open-source contributor.</p>
                
                <div class="stats">
                    <div class="stat">
                        <span class="number">50+</span>
                        <span class="label">Projects</span>
                    </div>
                    <div class="stat">
                        <span class="number">100+</span>
                        <span class="label">Followers</span>
                    </div>
                    <div class="stat">
                        <span class="number">5 Yrs</span>
                        <span class="label">Experience</span>
                    </div>
                </div>

                <div class="social-links">
                    <a href="#" class="social-btn github" title="GitHub">
                        <span>GitHub</span>
                    </a>
                    <a href="#" class="social-btn twitter" title="Twitter">
                        <span>Twitter</span>
                    </a>
                    <a href="#" class="social-btn linkedin" title="LinkedIn">
                        <span>LinkedIn</span>
                    </a>
                </div>

                <button class="follow-btn">Follow</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
