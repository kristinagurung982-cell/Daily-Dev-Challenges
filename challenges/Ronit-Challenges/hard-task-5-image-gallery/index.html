<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="back-link">
        <a href="../index.html">← Back to Challenges</a>
    </div>

    <div class="container">
        <header class="header">
            <h1>🖼️ Image Gallery</h1>
            <p>Click on any image to open the lightbox</p>
        </header>

        <div class="filters">
            <button class="filter-btn active" onclick="filterGallery('all')">All</button>
            <button class="filter-btn" onclick="filterGallery('nature')">Nature</button>
            <button class="filter-btn" onclick="filterGallery('city')">City</button>
            <button class="filter-btn" onclick="filterGallery('animals')">Animals</button>
        </div>

        <div class="gallery">
            <!-- Nature Images -->
            <div class="gallery-item" data-category="nature">
                <img src="https://via.placeholder.com/400x300?text=Mountain+Valley" alt="Mountain Valley" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Mountain Valley</span>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="https://via.placeholder.com/400x300?text=Forest+River" alt="Forest River" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Forest River</span>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="https://via.placeholder.com/400x300?text=Sunset+Beach" alt="Sunset Beach" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Sunset Beach</span>
                </div>
            </div>

            <!-- City Images -->
            <div class="gallery-item" data-category="city">
                <img src="https://via.placeholder.com/400x300?text=City+Lights" alt="City Lights" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">City Lights</span>
                </div>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="https://via.placeholder.com/400x300?text=Downtown+Street" alt="Downtown Street" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Downtown Street</span>
                </div>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="https://via.placeholder.com/400x300?text=Urban+Park" alt="Urban Park" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Urban Park</span>
                </div>
            </div>

            <!-- Animals Images -->
            <div class="gallery-item" data-category="animals">
                <img src="https://via.placeholder.com/400x300?text=Golden+Lion" alt="Golden Lion" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Golden Lion</span>
                </div>
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="https://via.placeholder.com/400x300?text=Flying+Eagle" alt="Flying Eagle" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Flying Eagle</span>
                </div>
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="https://via.placeholder.com/400x300?text=Wild+Elephant" alt="Wild Elephant" class="gallery-image">
                <div class="image-overlay">
                    <span class="overlay-text">Wild Elephant</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <span class="lightbox-prev">&larr;</span>
        <div class="lightbox-content">
            <img id="lightbox-image" src="" alt="">
            <div id="lightbox-caption" class="lightbox-caption"></div>
        </div>
        <span class="lightbox-next">&rarr;</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
