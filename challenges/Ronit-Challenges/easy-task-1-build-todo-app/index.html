<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="back-link">
            <a href="../index.html">← Back to Challenges</a>
        </div>

        <div class="todo-app">
            <h1>📝 My To-Do App</h1>
            
            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    class="task-input"
                />
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div id="taskList" class="task-list">
                <!-- Tasks will be added here -->
            </div>

            <div class="stats">
                <span>Total: <span id="totalCount">0</span></span>
                <span>Completed: <span id="completedCount">0</span></span>
                <span>Active: <span id="activeCount">0</span></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
