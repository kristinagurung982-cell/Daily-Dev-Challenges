<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="nav-wrap">
        <div class="brand">Aanand UI</div>
        <nav>
            <button class="menu-toggle" aria-expanded="false" aria-controls="dropdownMenu">Menu ▾</button>
            <ul id="dropdownMenu" class="menu" hidden>
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="content">
        <h1>Dropdown Menu</h1>
        <p>Click the menu button to open and close the dropdown options. This menu works on desktop and mobile.</p>
    </main>
    <script>
        const button = document.querySelector('.menu-toggle');
        const menu = document.getElementById('dropdownMenu');

        button.addEventListener('click', () => {
            const expanded = button.getAttribute('aria-expanded') === 'true';
            button.setAttribute('aria-expanded', String(!expanded));
            menu.hidden = expanded;
        });
    </script>
</body>
</html>
