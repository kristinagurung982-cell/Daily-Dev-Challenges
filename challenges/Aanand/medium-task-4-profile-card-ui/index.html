<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="card">
        <img class="avatar" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=400&q=80" alt="Profile avatar">
        <div class="info">
            <h1>Aanand</h1>
            <p class="subtitle">Frontend Developer</p>
            <p class="bio">Building beautiful interfaces and solving UI challenges with clean code.</p>
            <div class="stats">
                <div>
                    <strong>34</strong>
                    <span>Projects</span>
                </div>
                <div>
                    <strong>1.2K</strong>
                    <span>Followers</span>
                </div>
                <div>
                    <strong>18</strong>
                    <span>Articles</span>
                </div>
            </div>
            <div class="actions">
                <button>Follow</button>
                <button class="secondary">Message</button>
            </div>
        </div>
    </main>
</body>
</html>
