<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="gallery-container">
        <header class="gallery-header">
            <h1>🖼️ Image Gallery</h1>
            <p>A beautiful, responsive image gallery with lightbox and filtering</p>
        </header>

        <div class="gallery-controls">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="urban">Urban</button>
                <button class="filter-btn" data-filter="abstract">Abstract</button>
                <button class="filter-btn" data-filter="animals">Animals</button>
            </div>
            <div class="view-toggle">
                <button class="view-btn active" data-view="grid" title="Grid View">≡</button>
                <button class="view-btn" data-view="masonry" title="Masonry View">⊞</button>
            </div>
        </div>

        <div class="gallery" id="gallery">
            <!-- Gallery items will be dynamically inserted here -->
        </div>

        <div class="empty-state" id="emptyState">
            <p>No images found for this filter.</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-content">
            <button class="lightbox-close">&times;</button>
            <button class="lightbox-nav prev" id="prevBtn">❮</button>
            
            <div class="lightbox-main">
                <img id="lightboxImage" src="" alt="">
                <div class="lightbox-info">
                    <h3 id="lightboxTitle"></h3>
                    <p id="lightboxCategory"></p>
                </div>
            </div>

            <button class="lightbox-nav next" id="nextBtn">❯</button>

            <div class="lightbox-counter">
                <span id="currentImage">1</span> / <span id="totalImages">1</span>
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-link">← Back to Challenges</a>
    <script src="script.js"></script>
</body>
</html>
