<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Day 7 Easy Task 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .url-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .url-item.empty {
            text-align: center;
            color: #999;
        }

        .url-content {
            flex: 1;
        }

        .original {
            color: #666;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .short {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
        }

        .url-actions {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }

        .btn-copy,
        .btn-delete {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-copy {
            background: #667eea;
            color: white;
        }

        .btn-copy:hover {
            background: #5568d3;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a52;
        }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <p class="subtitle">Convert long URLs into short, shareable links</p>

        <div id="message" class="message"></div>

        <div class="form-group">
            <label for="urlInput">Enter Long URL</label>
            <input type="url" id="urlInput" placeholder="https://example.com/very/long/url">
        </div>

        <div class="form-group">
            <label for="customCode">Custom Short Code (Optional)</label>
            <input type="text" id="customCode" placeholder="e.g., 'mylink' or leave blank for auto">
        </div>

        <button onclick="shortenURL()">Generate Short URL</button>

        <div class="results" id="resultsSection" style="display: none;">
            <h3 style="color: #333; margin-bottom: 20px;">📋 Your Shortened URLs</h3>
            <div id="urlsList"></div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="totalShortened">0</div>
                    <div class="stat-label">URLs Shortened</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalUsed">0</div>
                    <div class="stat-label">Codes Used</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class URLShortener {
            constructor() {
                this.urls = JSON.parse(localStorage.getItem('shortenedURLs')) || {};
                this.render();
            }

            generateShortCode(length = 6) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let code = '';
                do {
                    code = '';
                    for (let i = 0; i < length; i++) {
                        code += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                } while (this.urls[code]);
                return code;
            }

            isValidURL(url) {
                try {
                    new URL(url);
                    return true;
                } catch (e) {
                    return false;
                }
            }

            shortenURL(originalURL, customCode = '') {
                // Validate URL
                if (!this.isValidURL(originalURL)) {
                    return { success: false, message: '❌ Invalid URL format' };
                }

                // Check if custom code is provided
                let shortCode = customCode.trim();
                
                if (shortCode) {
                    // Validate custom code
                    if (!/^[a-zA-Z0-9]+$/.test(shortCode)) {
                        return { success: false, message: '❌ Short code must be alphanumeric only' };
                    }
                    if (shortCode.length < 3) {
                        return { success: false, message: '❌ Short code must be at least 3 characters' };
                    }
                    if (this.urls[shortCode]) {
                        return { success: false, message: `❌ Code "${shortCode}" already exists` };
                    }
                } else {
                    // Generate automatic short code
                    shortCode = this.generateShortCode();
                }

                // Check if URL is already shortened
                const existingCode = Object.keys(this.urls).find(key => this.urls[key] === originalURL);
                if (existingCode) {
                    return { success: true, shortCode: existingCode, isNew: false, message: `ℹ️ URL already shortened as: ${existingCode}` };
                }

                // Add to URLs
                this.urls[shortCode] = originalURL;
                this.save();
                return { success: true, shortCode, isNew: true, message: `✅ URL shortened successfully!` };
            }

            deleteURL(shortCode) {
                delete this.urls[shortCode];
                this.save();
                this.render();
            }

            save() {
                localStorage.setItem('shortenedURLs', JSON.stringify(this.urls));
            }

            render() {
                const urlsList = document.getElementById('urlsList');
                const resultsSection = document.getElementById('resultsSection');
                const totalShortened = document.getElementById('totalShortened');
                const totalUsed = document.getElementById('totalUsed');

                const codes = Object.keys(this.urls);

                if (codes.length === 0) {
                    resultsSection.style.display = 'none';
                    return;
                }

                resultsSection.style.display = 'block';
                totalShortened.textContent = codes.length;
                totalUsed.textContent = new Set(Object.values(this.urls)).size;

                urlsList.innerHTML = codes.map(code => `
                    <div class="url-item">
                        <div class="url-content">
                            <div class="original">Original: ${this.urls[code]}</div>
                            <div class="short">Short: ${code}</div>
                        </div>
                        <div class="url-actions">
                            <button class="btn-copy" onclick="shortener.copyToClipboard('${code}')">Copy</button>
                            <button class="btn-delete" onclick="shortener.deleteURL('${code}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showMessage('✅ Copied to clipboard!', 'success');
                });
            }
        }

        // Initialize
        const shortener = new URLShortener();

        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }

        function shortenURL() {
            const urlInput = document.getElementById('urlInput').value;
            const customCode = document.getElementById('customCode').value;

            const result = shortener.shortenURL(urlInput, customCode);

            if (result.success) {
                showMessage(result.message, 'success');
                shortener.render();
                document.getElementById('urlInput').value = '';
                document.getElementById('customCode').value = '';
            } else {
                showMessage(result.message, 'error');
            }
        }

        // Allow Enter key to shorten
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') shortenURL();
        });
    </script>
</body>
</html>
