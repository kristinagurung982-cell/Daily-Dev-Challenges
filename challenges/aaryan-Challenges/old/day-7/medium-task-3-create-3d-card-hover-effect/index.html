<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card Hover - Day 7 Medium Task 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            perspective: 1000px;
        }

        /* 3D Card Styles */
        .card {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
        }

        .card:hover .card-inner {
            transform: rotateY(15deg) rotateX(10deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* Advanced 3D Effects */
        .card-2 {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
        }

        .card-2 .card-inner {
            transition: transform 0.6s ease-out;
        }

        .card-2:hover .card-inner {
            transform: rotateX(25deg) rotateY(15deg) scale(1.05);
        }

        .card-3 {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
        }

        .card-3 .card-inner {
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card-3:hover .card-inner {
            transform: rotateY(-20deg) rotateX(-10deg) translateZ(50px);
        }

        .card-front {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        .card-back {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        /* Card Variants */
        .card:nth-child(1) .card-front,
        .card-2:nth-child(1) .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card:nth-child(1) .card-back,
        .card-2:nth-child(1) .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card:nth-child(2) .card-front,
        .card-2:nth-child(2) .card-front {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .card:nth-child(2) .card-back,
        .card-2:nth-child(2) .card-back {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .card:nth-child(3) .card-front,
        .card-2:nth-child(3) .card-front {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .card:nth-child(3) .card-back,
        .card-2:nth-child(3) .card-back {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .card:nth-child(4) .card-front,
        .card-2:nth-child(4) .card-front {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .card:nth-child(4) .card-back,
        .card-2:nth-child(4) .card-back {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
        }

        .card:nth-child(5) .card-front,
        .card-2:nth-child(5) .card-front {
            background: linear-gradient(135deg, #2af598 0%, #009efd 100%);
        }

        .card:nth-child(5) .card-back,
        .card-2:nth-child(5) .card-back {
            background: linear-gradient(135deg, #ffa751 0%, #ffe259 100%);
        }

        .card:nth-child(6) .card-front,
        .card-2:nth-child(6) .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card:nth-child(6) .card-back,
        .card-2:nth-child(6) .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .section {
            margin-bottom: 60px;
        }

        .section-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .advanced-note {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            border-left: 4px solid white;
        }

        /* Interactive Controls */
        .controls {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .controls label {
            margin: 0 20px;
            font-size: 1.1rem;
        }

        .controls input[type="range"] {
            width: 300px;
            max-width: 100%;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .card,
            .card-2,
            .card-3 {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 3D Card Hover Effects</h1>
            <p>Hover over the cards to see stunning 3D transformations</p>
        </div>

        <div class="section">
            <h2 class="section-title">✨ Basic 3D Rotation</h2>
            <div class="grid" id="basicCards">
                <!-- Cards will be generated here -->
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">🚀 Advanced 3D Effects</h2>
            <div class="advanced-note">
                These cards combine multiple 3D transforms with scale and perspective changes for a more dramatic effect.
            </div>
            <div class="grid" id="advancedCards">
                <!-- Cards will be generated here -->
            </div>
        </div>
    </div>

    <script>
        const cardData = [
            { icon: '🎨', title: 'Design', description: 'Beautiful and responsive card designs with 3D perspective effects' },
            { icon: '⚡', title: 'Performance', description: 'Smooth animations using CSS transforms for optimal performance' },
            { icon: '📱', title: 'Responsive', description: 'Works seamlessly on all devices and screen sizes' },
            { icon: '🔧', title: 'Customizable', description: 'Easy to modify colors, effects, and animation timing' },
            { icon: '💡', title: 'Creative', description: 'Inspire users with unique and engaging visual effects' },
            { icon: '🌟', title: 'Premium Feel', description: 'Makes your website look modern and professional' }
        ];

        function createCard(data, isAdvanced = false) {
            const cardClass = isAdvanced ? 'card-2' : 'card';
            return `
                <div class="${cardClass}">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-icon">${data.icon}</div>
                            <div class="card-title">${data.title}</div>
                        </div>
                        <div class="card-back">
                            <div class="card-description">${data.description}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Generate basic cards
        const basicCards = document.getElementById('basicCards');
        cardData.forEach(data => {
            basicCards.innerHTML += createCard(data, false);
        });

        // Generate advanced cards
        const advancedCards = document.getElementById('advancedCards');
        cardData.forEach(data => {
            advancedCards.innerHTML += createCard(data, true);
        });

        // Add some interactivity tracking
        document.addEventListener('mousemove', function(e) {
            const cards = document.querySelectorAll('.card, .card-2, .card-3');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
            });
        });
    </script>
</body>
</html>
