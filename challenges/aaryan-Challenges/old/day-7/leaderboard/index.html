<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 7 Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .leaderboard {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .leaderboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .leaderboard-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .leaderboard-subtitle {
            opacity: 0.9;
        }

        /* Podium */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            padding: 30px;
            background: linear-gradient(to bottom, rgba(102, 126, 234, 0.05) 0%, rgba(102, 126, 234, 0) 100%);
        }

        .podium-position {
            text-align: center;
            flex: 0 0 150px;
        }

        .podium-position.first {
            order: 2;
        }

        .podium-position.second {
            order: 1;
        }

        .podium-position.third {
            order: 3;
        }

        .podium-medal {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .podium-rank {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px 12px 0 0;
            font-weight: 700;
            font-size: 1.5rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .podium-position.second .podium-rank {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            min-height: 80px;
        }

        .podium-position.third .podium-rank {
            background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%);
            min-height: 50px;
        }

        .podium-name {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 0 0 12px 12px;
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }

        .podium-score {
            color: #667eea;
            font-weight: 700;
            margin-top: 8px;
        }

        /* Table */
        .leaderboard-table {
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th {
            background: #f8f9fa;
            padding: 20px;
            text-align: left;
            color: #333;
            font-weight: 700;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            color: #666;
        }

        tr:hover {
            background: #f9f9f9;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 700;
            color: white;
            margin-right: 10px;
        }

        .rank-badge.gold {
            background: linear-gradient(135deg, #f6b319 0%, #daa520 100%);
        }

        .rank-badge.silver {
            background: linear-gradient(135deg, #c0c0c0 0%, #a9a9a9 100%);
        }

        .rank-badge.bronze {
            background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%);
        }

        .rank-badge.other {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .player-name {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 12px;
        }

        .score {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
        }

        .tasks-completed {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .podium {
                gap: 10px;
            }

            .podium-position {
                flex: 0 0 120px;
            }

            .podium-medal {
                font-size: 2rem;
            }

            .podium-rank {
                font-size: 1.2rem;
                min-height: 50px;
            }

            .podium-position.second .podium-rank {
                min-height: 60px;
            }

            th, td {
                padding: 15px 10px;
                font-size: 13px;
            }

            .filters {
                gap: 10px;
            }

            .filter-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Day 7 Leaderboard</h1>
            <p>Top performers on Day 7 challenges</p>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterByDifficulty('all')">All Tasks</button>
            <button class="filter-btn" onclick="filterByDifficulty('easy')">Easy</button>
            <button class="filter-btn" onclick="filterByDifficulty('medium')">Medium</button>
            <button class="filter-btn" onclick="filterByDifficulty('hard')">Hard</button>
        </div>

        <div class="leaderboard">
            <div class="leaderboard-header">
                <div class="leaderboard-title">Top Performers</div>
                <div class="leaderboard-subtitle">Celebrating our best solvers today</div>
            </div>

            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value">285+</div>
                    <div class="stat-label">Participants</div>
                </div>
                <div class="stat">
                    <div class="stat-value">1,542</div>
                    <div class="stat-label">Tasks Completed</div>
                </div>
                <div class="stat">
                    <div class="stat-value">98.5%</div>
                    <div class="stat-label">Success Rate</div>
                </div>
            </div>

            <!-- Podium -->
            <div class="podium">
                <div class="podium-position second">
                    <div class="podium-medal">🥈</div>
                    <div class="podium-rank">#2</div>
                    <div class="podium-name">Jane Smith</div>
                    <div class="podium-score">8,950 pts</div>
                </div>

                <div class="podium-position first">
                    <div class="podium-medal">🥇</div>
                    <div class="podium-rank">#1</div>
                    <div class="podium-name">John Doe</div>
                    <div class="podium-score">9,850 pts</div>
                </div>

                <div class="podium-position third">
                    <div class="podium-medal">🥉</div>
                    <div class="podium-rank">#3</div>
                    <div class="podium-name">Mike Johnson</div>
                    <div class="podium-score">8,720 pts</div>
                </div>
            </div>

            <!-- Leaderboard Table -->
            <div class="leaderboard-table">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">Rank</th>
                            <th>Player</th>
                            <th style="width: 120px;">Score</th>
                            <th style="width: 150px;">Tasks</th>
                            <th style="width: 100px;">Progress</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const players = [
            { rank: 1, name: 'John Doe', avatar: 'JD', score: 9850, tasks: '6/6', progress: 100 },
            { rank: 2, name: 'Jane Smith', avatar: 'JS', score: 8950, tasks: '6/6', progress: 100 },
            { rank: 3, name: 'Mike Johnson', avatar: 'MJ', score: 8720, tasks: '5/6', progress: 83 },
            { rank: 4, name: 'Sarah Williams', avatar: 'SW', score: 8640, tasks: '5/6', progress: 83 },
            { rank: 5, name: 'Alex Davis', avatar: 'AD', score: 8420, tasks: '5/6', progress: 83 },
            { rank: 6, name: 'Emily Brown', avatar: 'EB', score: 8150, tasks: '4/6', progress: 67 },
            { rank: 7, name: 'David Wilson', avatar: 'DW', score: 7890, tasks: '4/6', progress: 67 },
            { rank: 8, name: 'Lisa Anderson', avatar: 'LA', score: 7650, tasks: '4/6', progress: 67 },
            { rank: 9, name: 'Chris Martinez', avatar: 'CM', score: 7340, tasks: '4/6', progress: 67 },
            { rank: 10, name: 'Rachel Taylor', avatar: 'RT', score: 7120, tasks: '3/6', progress: 50 },
            { rank: 11, name: 'Kevin White', avatar: 'KW', score: 6890, tasks: '3/6', progress: 50 },
            { rank: 12, name: 'Jessica Lee', avatar: 'JL', score: 6650, tasks: '3/6', progress: 50 },
        ];

        function getRankBadge(rank) {
            if (rank === 1) return 'gold';
            if (rank === 2) return 'silver';
            if (rank === 3) return 'bronze';
            return 'other';
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = players.map(player => `
                <tr>
                    <td>
                        <span class="rank-badge ${getRankBadge(player.rank)}">
                            ${player.rank}
                        </span>
                    </td>
                    <td>
                        <div class="player-name">
                            <div class="player-avatar">${player.avatar}</div>
                            ${player.name}
                        </div>
                    </td>
                    <td><span class="score">${player.score.toLocaleString()}</span></td>
                    <td><span class="tasks-completed">${player.tasks}</span></td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="flex: 1; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden;">
                                <div style="height: 100%; width: ${player.progress}%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);"></div>
                            </div>
                            <span style="color: #667eea; font-weight: 600;">${player.progress}%</span>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterByDifficulty(difficulty) {
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Here you could filter the leaderboard based on difficulty
            // For now, we'll just show all data
            renderLeaderboard();
        }

        // Initial render
        renderLeaderboard();
    </script>
</body>
</html>
