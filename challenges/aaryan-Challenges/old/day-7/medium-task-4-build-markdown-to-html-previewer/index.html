<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to HTML Previewer - Day 7 Medium Task 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        textarea {
            width: 100%;
            min-height: 500px;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            padding: 0;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
        }

        #preview {
            min-height: 500px;
            line-height: 1.6;
        }

        /* Markdown Styling */
        #preview h1,
        #preview h2,
        #preview h3,
        #preview h4,
        #preview h5,
        #preview h6 {
            margin-top: 15px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        #preview h1 { font-size: 2rem; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        #preview h2 { font-size: 1.75rem; color: #667eea; }
        #preview h3 { font-size: 1.5rem; }
        #preview h4 { font-size: 1.25rem; }
        #preview h5 { font-size: 1.1rem; }
        #preview h6 { font-size: 1rem; color: #666; }

        #preview p {
            margin-bottom: 12px;
            color: #444;
        }

        #preview ul,
        #preview ol {
            margin-left: 30px;
            margin-bottom: 12px;
        }

        #preview li {
            margin-bottom: 6px;
            color: #444;
        }

        #preview code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #d63384;
        }

        #preview pre {
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        #preview pre code {
            background: none;
            color: #abb2bf;
            padding: 0;
        }

        #preview blockquote {
            border-left: 4px solid #667eea;
            margin-left: 0;
            padding-left: 15px;
            color: #666;
            font-style: italic;
            margin-bottom: 12px;
        }

        #preview a {
            color: #667eea;
            text-decoration: none;
        }

        #preview a:hover {
            text-decoration: underline;
        }

        #preview img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 12px 0;
        }

        #preview hr {
            border: none;
            height: 2px;
            background: #ddd;
            margin: 20px 0;
        }

        #preview strong {
            font-weight: 600;
            color: #333;
        }

        #preview em {
            font-style: italic;
            color: #555;
        }

        .controls {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .help-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .help-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .markdown-guide {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .guide-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .guide-item code {
            display: block;
            background: white;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 12px;
        }

        @media (max-width: 1024px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            textarea {
                min-height: 400px;
            }

            #preview {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Markdown to HTML Previewer</h1>
            <p>Type markdown on the left, see live HTML preview on the right</p>
        </div>

        <div class="editor-container">
            <div class="panel">
                <div class="panel-header">📄 Markdown Input</div>
                <div class="panel-content">
                    <textarea id="markdownInput" placeholder="Enter your markdown here...

# Example

This is a **bold text** and this is *italic*.

## Features

- Live preview
- Real-time conversion
- Support for common markdown

> Block quotes are supported too!

`Code snippets` are highlighted.</textarea>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">👁️ HTML Preview</div>
                <div class="panel-content">
                    <div id="preview"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="exportHTML()">📥 Export HTML</button>
            <button class="btn-secondary" onclick="clearEditor()">🗑️ Clear</button>
            <button class="btn-secondary" onclick="loadSample()">📚 Load Sample</button>
        </div>

        <div class="help-panel" style="margin-top: 30px;">
            <h3>📖 Markdown Syntax Guide</h3>
            <div class="markdown-guide">
                <div class="guide-item">
                    <strong># Headings</strong>
                    <code># H1, ## H2, ### H3</code>
                </div>
                <div class="guide-item">
                    <strong>**Bold & *Italic*</strong>
                    <code>**bold** or __bold__<br>*italic* or _italic_</code>
                </div>
                <div class="guide-item">
                    <strong>Lists</strong>
                    <code>- Item 1<br>- Item 2<br>1. Numbered</code>
                </div>
                <div class="guide-item">
                    <strong>[Links](url)</strong>
                    <code>[Text](https://example.com)</code>
                </div>
                <div class="guide-item">
                    <strong>Code</strong>
                    <code>`inline code`<br>```code block```</code>
                </div>
                <div class="guide-item">
                    <strong>> Blockquote</strong>
                    <code>> Quoted text</code>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple markdown parser
        class MarkdownParser {
            parse(markdown) {
                let html = markdown;

                // Escape HTML
                html = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');

                // Headers (must be before bold/italic)
                html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
                html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
                html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

                // Horizontal rule
                html = html.replace(/^\-\-\-$/gm, '<hr>');

                // Code blocks (before inline code)
                html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

                // Bold
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

                // Italic
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/_(.*?)_/g, '<em>$1</em>');

                // Inline code (before links)
                html = html.replace(/`(.*?)`/g, '<code>$1</code>');

                // Links
                html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');

                // Images
                html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">');

                // Blockquotes
                html = html.replace(/^&gt; (.*?)$/gm, '<blockquote>$1</blockquote>');

                // Unordered lists
                html = html.replace(/^\- (.*?)$/gm, '<li>$1</li>');
                html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

                // Ordered lists
                html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');

                // Paragraphs
                html = html.replace(/\n\n/g, '</p><p>');
                html = '<p>' + html + '</p>';

                // Clean up empty paragraphs
                html = html.replace(/<p><\/p>/g, '');
                html = html.replace(/<p>(<h[1-6])/g, '$1');
                html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
                html = html.replace(/<p>(<ul>)/g, '$1');
                html = html.replace(/(<\/ul>)<\/p>/g, '$1');
                html = html.replace(/<p>(<ol>)/g, '$1');
                html = html.replace(/(<\/ol>)<\/p>/g, '$1');
                html = html.replace(/<p>(<pre>)/g, '$1');
                html = html.replace(/(<\/pre>)<\/p>/g, '$1');
                html = html.replace(/<p>(<blockquote>)/g, '$1');
                html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
                html = html.replace(/<p>(<hr>)/g, '$1');
                html = html.replace(/(<hr>)<\/p>/g, '$1');

                return html;
            }
        }

        const parser = new MarkdownParser();
        const markdownInput = document.getElementById('markdownInput');
        const preview = document.getElementById('preview');

        // Update preview on input
        markdownInput.addEventListener('input', function() {
            const html = parser.parse(this.value);
            preview.innerHTML = html;
            localStorage.setItem('markdownContent', this.value);
        });

        // Load saved content
        function loadSavedContent() {
            const saved = localStorage.getItem('markdownContent');
            if (saved) {
                markdownInput.value = saved;
                const html = parser.parse(saved);
                preview.innerHTML = html;
            }
        }

        function clearEditor() {
            markdownInput.value = '';
            preview.innerHTML = '';
            localStorage.removeItem('markdownContent');
        }

        function exportHTML() {
            const html = preview.innerHTML;
            const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exported Markdown</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; }
    </style>
</head>
<body>
${html}
</body>
</html>`;

            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'exported.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadSample() {
            const sample = `# Welcome to Markdown Previewer

## Introduction
This is a **live markdown to HTML converter** that supports common markdown syntax.

## Features
- Real-time preview
- Support for headings, bold, italic
- Code blocks and inline code
- Links and images
- Block quotes and lists

## Code Example
\`\`\`javascript
function helloWorld() {
    console.log("Hello, World!");
}
\`\`\`

## Quote
> "The best time to write documentation is while you code." - Good Developer

## Links
[Visit GitHub](https://github.com)

---
Happy writing! 🎉`;
            markdownInput.value = sample;
            const html = parser.parse(sample);
            preview.innerHTML = html;
        }

        // Load saved content on page load
        loadSavedContent();
    </script>
</body>
</html>
