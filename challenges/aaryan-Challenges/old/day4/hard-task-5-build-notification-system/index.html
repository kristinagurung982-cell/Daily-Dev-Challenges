<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard Task 5: Notification System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eceffd;
            color: #1b2430;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .panel {
            width: 100%;
            max-width: 720px;
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 24px 70px rgba(32, 66, 132, 0.12);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 16px;
        }
        .buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .buttons button {
            border: none;
            border-radius: 999px;
            padding: 14px 24px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .buttons button:hover {
            transform: translateY(-1px);
        }
        .success { background: #3cb371; }
        .error { background: #e04f5f; }
        .info { background: #4a82ff; }
        .notification-area {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }
        .toast {
            min-width: 280px;
            background: white;
            border-radius: 18px;
            padding: 16px 18px;
            box-shadow: 0 18px 45px rgba(32, 64, 112, 0.14);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #1f2a40;
        }
        .toast.success { border-left: 6px solid #3cb371; }
        .toast.error { border-left: 6px solid #e04f5f; }
        .toast.info { border-left: 6px solid #4a82ff; }
        .toast button {
            border: none;
            background: transparent;
            color: #63718d;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Hard Task 5: Notification System</h1>
        <p>Generate toast notifications for success, error, and info messages. Each notification appears briefly and can be dismissed manually.</p>
        <div class="buttons">
            <button class="success" data-type="success">Show Success</button>
            <button class="error" data-type="error">Show Error</button>
            <button class="info" data-type="info">Show Info</button>
        </div>
    </div>
    <div class="notification-area" id="notificationArea"></div>
    <script>
        const notificationArea = document.getElementById('notificationArea');
        const messages = {
            success: 'Your changes were saved successfully!',
            error: 'Something went wrong. Please try again.',
            info: 'New update available. Check it out!'
        };

        document.querySelectorAll('.buttons button').forEach(button => {
            button.addEventListener('click', () => {
                createNotification(button.dataset.type);
            });
        });

        function createNotification(type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${messages[type]}</span>
                <button aria-label="Dismiss notification">×</button>
            `;
            const closeButton = toast.querySelector('button');
            closeButton.addEventListener('click', () => toast.remove());
            notificationArea.prepend(toast);
            setTimeout(() => toast.remove(), 4200);
        }
    </script>
</body>
</html>
