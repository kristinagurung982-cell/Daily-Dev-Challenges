<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Task 2: Loading Spinner</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef2ff 0%, #f9fbff 100%);
            color: #1c2530;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 540px;
            background: white;
            border-radius: 24px;
            padding: 34px;
            box-shadow: 0 20px 50px rgba(40, 80, 160, 0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
        }
        p {
            color: #5c6c88;
            margin-bottom: 28px;
        }
        button {
            border: none;
            background: #5b6df2;
            color: white;
            padding: 14px 24px;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .spinner {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 8px solid rgba(91, 109, 242, 0.18);
            border-top-color: #5b6df2;
            animation: spin 1s linear infinite;
            margin: 28px auto 12px;
            display: none;
        }
        .message {
            color: #344176;
            font-weight: 600;
            min-height: 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Easy Task 2: Loading Spinner</h1>
        <p>Click the button to simulate a loading process and display the spinner while waiting.</p>
        <button id="loadButton">Load Content</button>
        <div class="spinner" id="spinner"></div>
        <div class="message" id="message"></div>
    </div>

    <script>
        const loadButton = document.getElementById('loadButton');
        const spinner = document.getElementById('spinner');
        const message = document.getElementById('message');

        loadButton.addEventListener('click', () => {
            loadButton.disabled = true;
            message.textContent = '';
            spinner.style.display = 'block';

            setTimeout(() => {
                spinner.style.display = 'none';
                message.textContent = 'Content loaded successfully!';
                loadButton.disabled = false;
            }, 1800);
        });
    </script>
</body>
</html>
