<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Task 1: Pagination System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef3fc;
            color: #1f2a44;
        }
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            color: #52607f;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 22px 60px rgba(38, 72, 133, 0.08);
        }
        .items {
            display: grid;
            gap: 14px;
            margin-bottom: 24px;
        }
        .item {
            padding: 18px 20px;
            border-radius: 14px;
            background: #f7f9ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 0 0 1px rgba(82, 96, 127, 0.08);
        }
        .pagination {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .page-btn {
            border: none;
            padding: 10px 16px;
            border-radius: 999px;
            background: #e5ecff;
            color: #344176;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .page-btn:hover {
            transform: translateY(-1px);
        }
        .page-btn.active {
            background: #5b6df2;
            color: white;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Easy Task 1: Build Pagination System</h1>
        <p>Navigate a list of items using page controls. This demo shows page numbers, previous, and next navigation.</p>

        <div class="card">
            <div class="items" id="itemList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const items = Array.from({length: 30}, (_, i) => ({
            id: i + 1,
            title: `Item ${i + 1}`,
            description: `This is the description for item ${i + 1}.`
        }));
        const itemsPerPage = 6;
        let currentPage = 1;
        const itemList = document.getElementById('itemList');
        const pagination = document.getElementById('pagination');

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * itemsPerPage;
            const pageItems = items.slice(start, start + itemsPerPage);
            itemList.innerHTML = pageItems.map(item => `
                <div class="item">
                    <span><strong>${item.title}</strong></span>
                    <span>${item.description}</span>
                </div>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const pageCount = Math.ceil(items.length / itemsPerPage);
            pagination.innerHTML = '';

            const prevButton = document.createElement('button');
            prevButton.textContent = 'Previous';
            prevButton.className = 'page-btn';
            prevButton.disabled = currentPage === 1;
            prevButton.onclick = () => renderPage(currentPage - 1);
            pagination.appendChild(prevButton);

            for (let page = 1; page <= pageCount; page++) {
                const button = document.createElement('button');
                button.textContent = page;
                button.className = 'page-btn';
                if (page === currentPage) button.classList.add('active');
                button.onclick = () => renderPage(page);
                pagination.appendChild(button);
            }

            const nextButton = document.createElement('button');
            nextButton.textContent = 'Next';
            nextButton.className = 'page-btn';
            nextButton.disabled = currentPage === pageCount;
            nextButton.onclick = () => renderPage(currentPage + 1);
            pagination.appendChild(nextButton);
        }

        renderPage(1);
    </script>
</body>
</html>
