<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 Leaderboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #edf2ff;
            color: #17233d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .board {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 26px;
            padding: 36px;
            box-shadow: 0 22px 70px rgba(33, 59, 119, 0.12);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            color: #4d5f7e;
            margin-bottom: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.98rem;
        }
        th, td {
            text-align: left;
            padding: 18px 16px;
            border-bottom: 1px solid #edf0f8;
        }
        th {
            background: #f4f7ff;
            color: #33416d;
            font-weight: 700;
        }
        tbody tr:hover {
            background: #f8faff;
        }
        .rank {
            width: 70px;
            font-weight: 700;
        }
        .top {
            color: #375ad2;
        }
        .highlight {
            background: linear-gradient(90deg, rgba(88, 112, 254, 0.12), rgba(255, 255, 255, 0));
        }
    </style>
</head>
<body>
    <div class="board">
        <h1>Day 4 Leaderboard</h1>
        <p>See the top performers ranked by score, progress, and completion time.</p>
        <table>
            <thead>
                <tr>
                    <th class="rank">Rank</th>
                    <th>Participant</th>
                    <th>Score</th>
                    <th>Completed</th>
                </tr>
            </thead>
            <tbody>
                <tr class="highlight">
                    <td class="rank top">1</td>
                    <td>Alex Morgan</td>
                    <td>98</td>
                    <td>5 tasks</td>
                </tr>
                <tr class="highlight">
                    <td class="rank top">2</td>
                    <td>Riya Patel</td>
                    <td>94</td>
                    <td>5 tasks</td>
                </tr>
                <tr class="highlight">
                    <td class="rank top">3</td>
                    <td>David Chen</td>
                    <td>91</td>
                    <td>5 tasks</td>
                </tr>
                <tr>
                    <td class="rank">4</td>
                    <td>Priya Singh</td>
                    <td>88</td>
                    <td>5 tasks</td>
                </tr>
                <tr>
                    <td class="rank">5</td>
                    <td>Emma Jones</td>
                    <td>84</td>
                    <td>4 tasks</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
