<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API User Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>User Management API</h1>
        
        <div class="form-section">
            <h2>Create User</h2>
            <input type="text" id="userName" placeholder="Username">
            <input type="email" id="userEmail" placeholder="Email">
            <input type="text" id="userPhone" placeholder="Phone">
            <button id="createBtn">Create User</button>
        </div>

        <div class="controls">
            <button id="getAllBtn" class="control-btn">Get All Users</button>
            <button id="clearBtn" class="control-btn">Clear All</button>
        </div>

        <div class="users-section">
            <h2>Users List</h2>
            <div id="usersList" class="users-list"></div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
