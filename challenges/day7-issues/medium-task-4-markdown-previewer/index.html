<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to HTML Previewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Markdown to HTML Previewer 📝</h1>
        <div class="editor-container">
            <div class="editor-section">
                <h2>Markdown Input</h2>
                <textarea id="markdownInput" placeholder="Enter markdown here...
# Heading 1
## Heading 2
**Bold text**
*Italic text*

- Item 1
- Item 2

[Link](https://example.com)

\`inline code\`

\`\`\`
code block
\`\`\`"></textarea>
            </div>
            <div class="preview-section">
                <h2>HTML Preview</h2>
                <div id="htmlPreview" class="preview"></div>
            </div>
        </div>
        <div class="controls">
            <button id="copyBtn" class="btn">Copy HTML</button>
            <button id="downloadBtn" class="btn">Download</button>
            <button id="clearBtn" class="btn btn-danger">Clear</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
