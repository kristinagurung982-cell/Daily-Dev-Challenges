<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>URL Shortener 🔗</h1>
        <div class="shortener-box">
            <input 
                type="text" 
                id="urlInput" 
                placeholder="Enter your long URL here..." 
                class="url-input"
            >
            <button id="shortenBtn" class="btn-shorten">Shorten URL</button>
            
            <div id="result" class="result" style="display: none;">
                <h3>Shortened URL:</h3>
                <div class="url-display">
                    <input type="text" id="shortenedUrl" readonly class="shortened-input">
                    <button id="copyBtn" class="btn-copy">Copy</button>
                </div>
                <p id="feedback" class="feedback"></p>
            </div>
            
            <div id="urlList" class="url-list">
                <h3>Recent URLs:</h3>
                <ul id="URLs"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
