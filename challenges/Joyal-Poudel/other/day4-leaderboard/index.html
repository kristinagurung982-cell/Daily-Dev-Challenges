<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 Leaderboard | Daily Dev Challenge</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="badge">🏆 DAY 4</div>
            <h1>Global Leaderboard</h1>
            <p>Tracking the top performers of the Daily Dev Challenges.</p>
        </header>

        <main class="leaderboard-card">
            <div class="leaderboard-header">
                <div class="filters">
                    <button class="filter-btn active" data-category="all">All Challenges</button>
                    <button class="filter-btn" data-category="easy">Easy</button>
                    <button class="filter-btn" data-category="medium">Medium</button>
                    <button class="filter-btn" data-category="hard">Hard</button>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Find developer...">
                </div>
            </div>

            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Developer</th>
                            <th>Category</th>
                            <th>Points</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            <p>Day 4 Leaderboard | Last updated: 2026-04-10</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
