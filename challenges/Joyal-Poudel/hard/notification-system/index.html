<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Notification System | Day 4 Hard Task 5</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Global Notification System</h1>
            <p>A high-performance toast notification engine with stack management.</p>
        </header>

        <main class="control-center">
            <div class="card">
                <h2>Trigger Notifications</h2>
                <div class="btn-grid">
                    <button class="btn btn-success" id="btn-success">
                        <span class="icon">✅</span> Success
                    </button>
                    <button class="btn btn-error" id="btn-error">
                        <span class="icon">❌</span> Error
                    </button>
                    <button class="btn btn-warning" id="btn-warning">
                        <span class="icon">⚠️</span> Warning
                    </button>
                    <button class="btn btn-info" id="btn-info">
                        <span class="icon">ℹ️</span> Info
                    </button>
                </div>
            </div>

            <div class="card settings-card">
                <h2>Configuration</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Placement</label>
                        <select id="placement-select">
                            <option value="top-right">Top Right</option>
                            <option value="top-left">Top Left</option>
                            <option value="bottom-right">Bottom Right</option>
                            <option value="bottom-left">Bottom Left</option>
                        </select>
                    </div>
                </div>
            </div>
        </main>

        <!-- Notification container (managed by JS) -->
        <div id="notification-container" class="notification-container top-right"></div>

        <footer>
            <p>Day 4 - HARD Task 5 | Built with ❤️ by Joyal Poudel</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
