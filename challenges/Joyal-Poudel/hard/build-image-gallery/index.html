<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Image Gallery</h1>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search images...">
            </div>
            <div class="view-options">
                <button class="view-btn active" data-view="grid">
                    <i class="fas fa-th"></i> Grid
                </button>
                <button class="view-btn" data-view="masonry">
                    <i class="fas fa-th-large"></i> Masonry
                </button>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery" id="gallery">
            <!-- Images will be dynamically loaded -->
        </div>

        <!-- Lightbox Modal -->
        <div id="lightbox" class="lightbox">
            <button class="lightbox-prev" id="prevBtn" title="Previous image"><i class="fas fa-chevron-left"></i></button>
            <div class="lightbox-content">
                <img id="lightboxImg" src="" alt="">
                <p id="lightboxCaption"></p>
            </div>
            <button class="lightbox-next" id="nextBtn" title="Next image"><i class="fas fa-chevron-right"></i></button>
            <span class="lightbox-close" id="closeLightbox">&times;</span>
            <div class="lightbox-info" id="imageInfo"></div>
        </div>

        <!-- Loading spinner -->
        <div class="spinner" id="spinner">
            <div class="spin"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
