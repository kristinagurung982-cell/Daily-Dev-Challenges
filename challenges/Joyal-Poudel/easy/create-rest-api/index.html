<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>REST API Demo with JSONPlaceholder</h1>
        
        <div class="controls">
            <div class="input-group">
                <input type="number" id="userId" placeholder="Enter User ID (1-10)" min="1" max="10" value="1">
                <button id="getUserBtn">Get User</button>
            </div>
            
            <div class="input-group">
                <button id="getAllPostsBtn">Get All Posts</button>
                <button id="getPostsBtn">Get User Posts</button>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2>User Details</h2>
                <div id="userDetails" class="details"></div>
            </div>

            <div class="section">
                <h2>Posts</h2>
                <div id="postsList" class="list"></div>
            </div>

            <div class="section">
                <h2>Raw Response</h2>
                <pre id="rawResponse"></pre>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
