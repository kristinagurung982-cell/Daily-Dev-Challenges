<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Loading Spinners | Day 4 Easy Task 2</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Premium Loading Spinners</h1>
            <p>A collection of high-end, smooth loading animations for modern interfaces.</p>
        </header>

        <main class="spinner-grid">
            <div class="spinner-card">
                <div class="spinner-box">
                    <div class="spinner-classic"></div>
                </div>
                <h3>Classic Pulse</h3>
            </div>

            <div class="spinner-card">
                <div class="spinner-box">
                    <div class="spinner-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
                <h3>Bouncing Dots</h3>
            </div>

            <div class="spinner-card">
                <div class="spinner-box">
                    <div class="spinner-orbit">
                        <div class="orbit-inner"></div>
                    </div>
                </div>
                <h3>Cosmic Orbit</h3>
            </div>

            <div class="spinner-card">
                <div class="spinner-box">
                    <div class="spinner-bars">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </div>
                <h3>Modern Bars</h3>
            </div>

            <div class="spinner-card">
                <div class="spinner-box">
                    <div class="spinner-gradient"></div>
                </div>
                <h3>Glow Circle</h3>
            </div>

            <div class="spinner-card">
                <div class="spinner-box">
                    <div class="spinner-square"></div>
                </div>
                <h3>Morphing Square</h3>
            </div>
        </main>

        <section class="demo-section">
            <button id="demo-btn" class="main-btn">Trigger Fullscreen Overlay</button>
        </section>

        <div id="loading-overlay" class="overlay hidden">
            <div class="overlay-content">
                <div class="spinner-classic large"></div>
                <p>Establishing connection...</p>
            </div>
        </div>

        <footer>
            <p>Day 4 - EASY Task 2 | Built with ❤️ by Joyal Poudel</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
