<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>Pagination System</h1>
        <p class="description">A fully functional pagination system with previous/next buttons and page indicators.</p>

        <div class="content-area">
            <div id="items-container" class="items-container">
                <!-- Items will be dynamically generated -->
            </div>
        </div>

        <div class="pagination">
            <button id="prev-btn" class="pagination-btn" aria-label="Previous page">← Previous</button>
            
            <div id="page-numbers" class="page-numbers">
                <!-- Page numbers will be dynamically generated -->
            </div>
            
            <button id="next-btn" class="pagination-btn" aria-label="Next page">Next →</button>
        </div>

        <div class="info">
            <p id="page-info">Page 1</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
