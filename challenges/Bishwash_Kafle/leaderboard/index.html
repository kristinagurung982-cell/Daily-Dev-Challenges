<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>🏆 Day 4 Leaderboard</h1>
        <p class="subtitle">Top Performers for Day 4 Challenges</p>

        <div class="leaderboard-container">
            <!-- Leaderboard Table -->
            <div class="leaderboard-table">
                <div class="table-header">
                    <div class="rank-col">Rank</div>
                    <div class="name-col">Username</div>
                    <div class="points-col">Points</div>
                    <div class="tasks-col">Tasks Completed</div>
                    <div class="time-col">Time</div>
                </div>

                <div class="table-body" id="leaderboard-body">
                    <!-- Leaderboard rows will be generated here -->
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-card">
                    <h3>Total Participants</h3>
                    <p class="stat-value" id="total-participants">0</p>
                </div>
                <div class="stat-card">
                    <h3>Tasks Available</h3>
                    <p class="stat-value">6</p>
                </div>
                <div class="stat-card">
                    <h3>Total Points</h3>
                    <p class="stat-value" id="total-points">0</p>
                </div>
                <div class="stat-card">
                    <h3>Avg. Completion</h3>
                    <p class="stat-value" id="avg-completion">0%</p>
                </div>
            </div>
        </div>

        <!-- Filter and Sort Options -->
        <div class="controls">
            <button id="sort-points" class="sort-btn active">Sort by Points</button>
            <button id="sort-tasks" class="sort-btn">Sort by Tasks</button>
            <button id="sort-time" class="sort-btn">Sort by Time</button>
        </div>

        <!-- Back Button -->
        <div class="back-button">
            <a href="../index.html">← Back to Day 4 Overview</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
