<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 7 Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🏆 Day 7 Leaderboard</h1>
        <div class="leaderboard-box">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All Tasks</button>
                <button class="filter-btn" data-filter="easy">Easy</button>
                <button class="filter-btn" data-filter="medium">Medium</button>
                <button class="filter-btn" data-filter="hard">Hard</button>
            </div>

            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Developer</th>
                        <th>Task</th>
                        <th>Difficulty</th>
                        <th>Completed</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>

            <div class="stats-summary">
                <h3>Summary</h3>
                <div class="summary-grid">
                    <div class="summary-item">
                        <p class="label">Total Submissions</p>
                        <p class="value" id="totalSubmissions">0</p>
                    </div>
                    <div class="summary-item">
                        <p class="label">Easy Completed</p>
                        <p class="value" id="easyCompleted">0</p>
                    </div>
                    <div class="summary-item">
                        <p class="label">Medium Completed</p>
                        <p class="value" id="mediumCompleted">0</p>
                    </div>
                    <div class="summary-item">
                        <p class="label">Hard Completed</p>
                        <p class="value" id="hardCompleted">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
