<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📋 Form Validation Challenge</h1>
            <p>Complete the form with valid information</p>
        </header>

        <div class="form-container">
            <form id="validationForm" class="validation-form">
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName"
                        placeholder="John Doe"
                        required
                    >
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="john@example.com"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        placeholder="(123) 456-7890"
                        required
                    >
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="Min 8 characters"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text">Password strength: <strong id="strengthLevel">Weak</strong></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword"
                        placeholder="Re-enter password"
                        required
                    >
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="website">Website (Optional):</label>
                    <input 
                        type="url" 
                        id="website" 
                        name="website"
                        placeholder="https://example.com"
                    >
                    <span class="error-message" id="websiteError"></span>
                </div>

                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms"
                        required
                    >
                    <label for="terms">I agree to the Terms and Conditions</label>
                    <span class="error-message" id="termsError"></span>
                </div>

                <button type="submit" class="submit-btn">Submit Form</button>
            </form>

            <div class="success-message" id="successMessage">
                <span class="success-icon">✅</span>
                <h2>Form Submitted Successfully!</h2>
                <p>Your information has been validated and submitted.</p>
            </div>
        </div>

        <a href="../../index.html" class="back-link">← Back to Challenges</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
