<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🧮 Calculator App</h1>
            <p>Perform basic arithmetic operations</p>
        </header>

        <div class="calculator">
            <div class="display" id="display">0</div>
            
            <div class="buttons">
                <button class="btn function-btn" onclick="calculator.clear()">AC</button>
                <button class="btn function-btn" onclick="calculator.delete()">DEL</button>
                <button class="btn function-btn" onclick="calculator.appendOperator('%')">%</button>
                <button class="btn operator-btn" onclick="calculator.appendOperator('/')">÷</button>

                <button class="btn" onclick="calculator.appendNumber('7')">7</button>
                <button class="btn" onclick="calculator.appendNumber('8')">8</button>
                <button class="btn" onclick="calculator.appendNumber('9')">9</button>
                <button class="btn operator-btn" onclick="calculator.appendOperator('*')">×</button>

                <button class="btn" onclick="calculator.appendNumber('4')">4</button>
                <button class="btn" onclick="calculator.appendNumber('5')">5</button>
                <button class="btn" onclick="calculator.appendNumber('6')">6</button>
                <button class="btn operator-btn" onclick="calculator.appendOperator('-')">−</button>

                <button class="btn" onclick="calculator.appendNumber('1')">1</button>
                <button class="btn" onclick="calculator.appendNumber('2')">2</button>
                <button class="btn" onclick="calculator.appendNumber('3')">3</button>
                <button class="btn operator-btn" onclick="calculator.appendOperator('+')">+</button>

                <button class="btn zero-btn" onclick="calculator.appendNumber('0')">0</button>
                <button class="btn" onclick="calculator.appendNumber('.')">.</button>
                <button class="btn equals-btn" onclick="calculator.calculate()">=</button>
            </div>

            <div class="history">
                <h3>History</h3>
                <div id="historyList" class="history-list"></div>
                <button class="clear-history-btn" onclick="calculator.clearHistory()">Clear History</button>
            </div>
        </div>

        <a href="../../index.html" class="back-link">← Back to Challenges</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
