name: Daily Challenge System (Viral & Fixed)

on:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3:00 AM
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  daily-system:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      # 🧠 STEP 1: Calculate Day & Create Tasks
      - name: Generate Challenges
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Get all issues to calculate the current Day
            const allIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all"
            });

            // Filter for only "Daily Challenge" issues to get an accurate day count
            const challengeIssues = allIssues.data.filter(i => i.title.includes("Day"));
            const currentDay = Math.floor(challengeIssues.length / 5) + 1;
            
            // 💡 UPDATED TASK LIST: More variety & modern tech
            const tasks = [
              "Implement a custom React Hook (useLocalStorage)", "Build a Neumorphic UI Button", 
              "Write a script to scrape trending GitHub repos", "Create a Glassmorphism Login Card",
              "Design a CSS-only infinite scroll animation", "Build a URL Shortener logic",
              "Implement a Debounce function in JavaScript", "Create a 3D Card Hover effect",
              "Build a Markdown to HTML previewer", "Design a responsive Dashboard Sidebar",
              "Create a JWT authentication flow simulation", "Build a Pomodoro Timer with Sound",
              "Implement a 'Drag and Drop' file uploader", "Create a dynamic Skeleton Loader",
              "Build a Weather App using Fetch API", "Write a regex-based Password Validator",
              "Implement a 'Dark/Light' mode with System preference", "Build a Currency Converter",
              "Create a Framer Motion page transition", "Implement a simple Redux-like state store",
              "Build a Quiz app with a progress bar", "Create a custom Video Player UI",
              "Design a Twitter/X character counter", "Implement an Image Lazy Loader",
              "Build a Snake Game in 100 lines of JS"
            ];

            const startIndex = (currentDay - 1) * 5;

            // 2. Close Yesterday's Issues
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const issue of openIssues.data) {
              if (issue.title.includes(`Day ${currentDay - 1}`)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## ⏳ Challenge Closed\nMove to Day ${currentDay} 🚀`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed"
                });
              }
            }

            // 3. Create 5 New Challenges
            for (let i = 0; i < 5; i++) {
              const taskIndex = (startIndex + i) % tasks.length;
              const task = tasks[taskIndex];
              const levels = ["EASY", "EASY", "MEDIUM", "MEDIUM", "HARD"];
              const level = levels[i];

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Day ${currentDay} - ${level} Task ${i+1}: ${task}`,
                body: `### 🧠 Day ${currentDay} Challenge\n\n` +
                      `**Difficulty:** \`${level}\`\n` +
                      `**Task:** ${task}\n` +
                      `**Submission Folder:** \`challenges/day-${currentDay}/your-username/\`\n\n` +
                      `--- \n` +
                      `🔥 **Goal:** Solve this and submit a PR to maintain your streak!\n` +
                      `💡 **Tip:** Tag a friend in the comments to challenge them.`,
                labels: ["daily-challenge", level.toLowerCase()]
              });
            }

            // 4. Create the Leaderboard
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏆 Day ${currentDay} Leaderboard`,
              body: `## 🏆 Day ${currentDay} Leaderboard\n\n` +
                    `Submit your Pull Requests for today's tasks! The first three contributors to get their PR merged will be featured here.\n\n` +
                    `| Rank | User | Task Completed |\n` +
                    `| :--- | :--- | :--- |\n` +
                    `| 🥇 | - | - |\n` +
                    `| 🥈 | - | - |\n` +
                    `| 🥉 | - | - |\n\n` +
                    `🚀 Keep coding!`,
              labels: ["leaderboard"]
            });
