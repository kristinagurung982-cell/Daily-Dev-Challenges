<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Day 7 Easy Task 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .urls-list {
            margin-top: 30px;
        }

        .urls-list h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .url-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .url-details {
            flex: 1;
        }

        .original-url {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .short-url {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }

        .short-url:hover {
            text-decoration: underline;
        }

        .copy-btn {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .delete-btn {
            padding: 8px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .success-message {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <p class="subtitle">Create short, shareable links from long URLs</p>

        <div class="input-group">
            <input 
                type="url" 
                id="urlInput" 
                placeholder="Enter a long URL..." 
                required
            >
            <button onclick="shortenURL()">Shorten</button>
        </div>

        <div class="urls-list">
            <h2>Shortened URLs</h2>
            <div id="urlsList" class="empty-state">No shortened URLs yet. Create your first one!</div>
        </div>
    </div>

    <script>
        // Simple URL shortener implementation
        class URLShortener {
            constructor() {
                this.urls = this.loadFromStorage();
            }

            generateShortCode(length = 6) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let shortCode = '';
                for (let i = 0; i < length; i++) {
                    shortCode += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return shortCode;
            }

            shortenURL(originalURL) {
                // Validate URL
                try {
                    new URL(originalURL);
                } catch (e) {
                    return null;
                }

                const shortCode = this.generateShortCode();
                const shortURL = `short.link/${shortCode}`;
                
                this.urls.push({
                    id: Date.now(),
                    original: originalURL,
                    short: shortURL,
                    shortCode: shortCode,
                    created: new Date().toLocaleString()
                });

                this.saveToStorage();
                return { original: originalURL, short: shortURL };
            }

            getAllURLs() {
                return this.urls;
            }

            deleteURL(id) {
                this.urls = this.urls.filter(url => url.id !== id);
                this.saveToStorage();
            }

            saveToStorage() {
                localStorage.setItem('shortenedURLs', JSON.stringify(this.urls));
            }

            loadFromStorage() {
                const stored = localStorage.getItem('shortenedURLs');
                return stored ? JSON.parse(stored) : [];
            }
        }

        const shortener = new URLShortener();

        function shortenURL() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();

            if (!url) {
                alert('Please enter a URL');
                return;
            }

            const result = shortener.shortenURL(url);
            if (!result) {
                alert('Please enter a valid URL');
                return;
            }

            input.value = '';
            renderURLs();
        }

        function renderURLs() {
            const urlsList = document.getElementById('urlsList');
            const urls = shortener.getAllURLs();

            if (urls.length === 0) {
                urlsList.innerHTML = '<div class="empty-state">No shortened URLs yet. Create your first one!</div>';
                return;
            }

            urlsList.innerHTML = urls.reverse().map(url => `
                <div class="url-item">
                    <div class="url-details">
                        <div class="original-url">Original: ${url.original}</div>
                        <div class="short-url" onclick="copyToClipboard('${url.short}')" title="Click to copy">${url.short}</div>
                    </div>
                    <button class="copy-btn" onclick="copyToClipboard('${url.short}')">Copy</button>
                    <button class="delete-btn" onclick="deleteURL(${url.id})">Delete</button>
                </div>
            `).join('');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            }).catch(err => console.error('Copy failed:', err));
        }

        function deleteURL(id) {
            if (confirm('Are you sure you want to delete this URL?')) {
                shortener.deleteURL(id);
                renderURLs();
            }
        }

        // Handle Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                shortenURL();
            }
        });

        // Initial render
        renderURLs();
    </script>
</body>
</html>
